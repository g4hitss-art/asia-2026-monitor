name: Monitor Ruta Carlos — Asia 2026

on:
  schedule:
    # ── Horarios estratégicos (Colombia = UTC-5) ──────────────
    # Las aerolíneas japonesas/coreanas cargan nuevas tarifas
    # los martes y miércoles hora Asia — equivale a lunes/martes
    # noche en Colombia.

    # LUNES — noche estratégica (aerolíneas Tokio/Seúl abren martes)
    - cron: '0 4 * * 2'     # Lunes 11:00pm COT = Martes 04:00 UTC

    # MARTES — día de tarifas (6 revisiones)
    - cron: '0 8  * * 2'    # 3:00am COT
    - cron: '0 12 * * 2'    # 7:00am COT
    - cron: '0 15 * * 2'    # 10:00am COT
    - cron: '0 18 * * 2'    # 1:00pm COT
    - cron: '0 21 * * 2'    # 4:00pm COT
    - cron: '0 1  * * 3'    # 8:00pm COT (ya es miércoles UTC)

    # MIÉRCOLES — segundo día de tarifas (4 revisiones)
    - cron: '0 12 * * 3'    # 7:00am COT
    - cron: '0 16 * * 3'    # 11:00am COT
    - cron: '0 20 * * 3'    # 3:00pm COT
    - cron: '0 1  * * 4'    # 8:00pm COT

    # JUEVES, VIERNES, SÁBADO, DOMINGO — 2 revisiones/día
    - cron: '0 12 * * 4,5,6,0'   # 7:00am COT
    - cron: '0 1  * * 5,6,0,1'   # 8:00pm COT (siguiente día UTC)

  # Ejecución manual desde GitHub
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo de la ejecución manual'
        required: false
        default: 'Revisión manual'

jobs:
  monitor-carlos:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install fast-flights twilio requests

      - name: Ejecutar monitor ruta Carlos
        env:
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python monitor_carlos.py

      - name: Guardar log como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-carlos-${{ github.run_number }}
          path: monitor_carlos.log
          retention-days: 14
